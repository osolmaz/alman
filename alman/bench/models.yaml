    generate:
      reasoning_effort: xhigh
      max_tokens: 16384
    pricing:
      uncached_input_per_million_tokens: 2.0
      cached_input_per_million_tokens: 0.2
      cache_creation_input_per_million_tokens: 2.5
      output_per_million_tokens: 10.0
      observed: 2026-07-16

  # Hugging Face Inference Providers (router). Provider suffixes are pinned
  # for reproducibility; pricing is the pinned provider's router price.

  kimi-k2.7-code:
    label: Kimi K2.7 Code
    platform: huggingface-inference-providers
    model: openai-api/hf/moonshotai/Kimi-K2.7-Code:novita
    env:
      HF_BASE_URL: https://router.huggingface.co/v1
      HF_API_KEY: ${HF_TOKEN}
    generate:
      max_tokens: 16384
      temperature: 1.0
      top_p: 1.0
    pricing:
