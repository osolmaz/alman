# Model registry for standardized almanbench runs.
#
# One profile per reproducible configuration: the Inspect model string,
# provider environment, generation config, concurrency, and observed pricing
# (USD per million tokens, with the date it was read from the provider).
# Run a profile with:
#
#     uv run bench-run <profile>
#
# Routing follows Inspect model strings. `openai/...` and `anthropic/...` use
# the native providers. Any OpenAI-compatible endpoint (Hugging Face router,
# dedicated Inference Endpoints, local servers) uses
# `openai-api/<service>/<model>` with `<SERVICE>_BASE_URL` and
# `<SERVICE>_API_KEY` from the profile env; `${VAR}` values are read from the
# ambient environment at run time.

defaults:
  max_connections: 8

profiles:
  gpt-5.6-sol-xhigh:
    label: GPT-5.6 Sol
    platform: openai-api
    model: openai/gpt-5.6-sol
    generate:
      reasoning_effort: xhigh
      max_tokens: 16384
    pricing:
      uncached_input_per_million_tokens: 5.0
      cached_input_per_million_tokens: 0.5
      cache_creation_input_per_million_tokens: 6.25
      output_per_million_tokens: 30.0
      observed: 2026-07-16

